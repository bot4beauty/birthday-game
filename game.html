<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Balloon Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:Arial,sans-serif;background:linear-gradient(#87ceeb,#ffe4e1)}
#title{position:fixed;top:15px;width:100%;text-align:center;color:#fff;text-shadow:0 0 8px #000;z-index:10}
#balloon{position:absolute;font-size:90px;cursor:pointer;user-select:none}
.photo{position:fixed;inset:0;display:none;background:#000;justify-content:center;align-items:center;flex-direction:column;z-index:100}
.photo img{width:100%;height:100%;object-fit:contain}
.message{position:absolute;bottom:120px;color:#fff;font-size:26px;text-align:center;width:90%}
#continue{position:absolute;bottom:40px;padding:12px 28px;border:none;border-radius:30px;background:#ff1493;color:#fff}
#finish{display:none;position:fixed;inset:0;background:#111;color:#fff;justify-content:center;align-items:center;flex-direction:column;text-align:center}
.confetti{position:fixed;width:8px;height:8px;animation:fall 2s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<h1 id="title">🎈 Pop the Balloon 🎈</h1>
<div id="balloon">🎈</div>

<audio id="bgMusic" autoplay loop><source src="music.mp3" type="audio/mpeg"></audio>
<audio id="popSound" preload="auto"><source src="pop.mp3" type="audio/mpeg"></audio>

<div class="photo" id="viewer">
<img id="img">
<div class="message" id="msg"></div>
<button id="continue">Continue ❤️</button>
</div>

<div id="finish">
<h1>🎉 Happy Birthday ❤️</h1>
<p>Love You Forever!</p>
</div>

<script>
const photos=["faty1.jpg","faty2.jpg","faty3.jpg","faty4.jpg","faty5.jpg","faty6.jpg"];
const messages=[
"❤️ Your smile brightens my day.",
"🥰 I feel lucky to have you.",
"🌹 Every memory with you is special.",
"💕 You make my world beautiful.",
"✨ My heart is addicted.",
"🎂 Happy Birthday My Love!"
];
const balloons=["🔴","🟠","🟡","🟢","🔵","🟣","🩷","🎈"];
const balloon=document.getElementById("balloon");
const viewer=document.getElementById("viewer");
const img=document.getElementById("img");
const msg=document.getElementById("msg");
const pop=document.getElementById("popSound");
document.addEventListener("click",()=>document.getElementById("bgMusic").play().catch(()=>{}),{once:true});

let i=0,x=120,y=150,dx=3,dy=2.5;
function randBalloon(){balloon.textContent=balloons[Math.floor(Math.random()*balloons.length)]}
randBalloon();

function confetti(){
 for(let j=0;j<25;j++){
   const c=document.createElement("div");
   c.className="confetti";
   c.style.left=Math.random()*100+"vw";
   c.style.top="-10px";
   c.style.background=`hsl(${Math.random()*360},100%,50%)`;
   document.body.appendChild(c);
   setTimeout(()=>c.remove(),2000);
 }
}
function move(){
 x+=dx;y+=dy;
 if(x<=0){x=0;dx=Math.abs(dx)}
 if(x>=innerWidth-balloon.offsetWidth){x=innerWidth-balloon.offsetWidth;dx=-Math.abs(dx)}
 if(y<=70){y=70;dy=Math.abs(dy)}
 if(y>=innerHeight-balloon.offsetHeight){y=innerHeight-balloon.offsetHeight;dy=-Math.abs(dy)}
 balloon.style.left=x+"px";
 balloon.style.top=y+"px";
 requestAnimationFrame(move);
}
move();

balloon.onclick=()=>{
 pop.currentTime=0;pop.play().catch(()=>{});
 confetti();
 balloon.textContent="💥";
 setTimeout(()=>{
   balloon.style.display="none";
   img.src=photos[i];
   msg.textContent=messages[i];
   viewer.style.display="flex";
 },250);
};

document.getElementById("continue").onclick=()=>{
 viewer.style.display="none";
 i++;
 if(i>=photos.length){
   document.getElementById("finish").style.display="flex";
   return;
 }
 randBalloon();
 balloon.style.display="block";
 x=Math.random()*(innerWidth-balloon.offsetWidth);
 y=80+Math.random()*(innerHeight-balloon.offsetHeight-80);
 dx=(Math.random()>.5?1:-1)*(2+Math.random()*2);
 dy=(Math.random()>.5?1:-1)*(2+Math.random()*2);
};

window.addEventListener("resize",()=>{
 x=Math.min(x,innerWidth-balloon.offsetWidth);
 y=Math.min(y,innerHeight-balloon.offsetHeight);
});
</script>
</body>
</html>
